name: Deploy Spring Boot to EC2 via OIDC + SSM

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  INSTANCE_ID: i-0fba03625b70f56a7

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Spring Boot App
        run: mvn clean package -DskipTests

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ Upload JAR to EC2 via SSM (NO external URL needed)
      - name: Deploy via SSM (FIXED)
        run: |
          JAR_FILE=$(ls target/*.jar | head -n 1)

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Spring Boot App" \
            --parameters "commands=[
              \"mkdir -p /home/ubuntu/app\",
              \"pkill -f app.jar || true\",
              \"aws s3 cp $JAR_FILE s3://YOUR_BUCKET/app.jar\",
              \"aws s3 cp s3://YOUR_BUCKET/app.jar /home/ubuntu/app/app.jar\",
              \"nohup java -jar /home/ubuntu/app/app.jar --server.address=0.0.0.0 --server.port=8080 > /home/ubuntu/app/app.log 2>&1 &\"
            ]" \
            --region $AWS_REGION

      - name: Verify EC2 status
        run: |
          aws ssm describe-instance-information \
            --region $AWS_REGION \
            --query "InstanceInformationList[*].[InstanceId,PingStatus]" \
            --output table
