name: Deploy Spring Boot to EC2 via OIDC + SSM

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  INSTANCE_ID: i-094848138c2885f37

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Build Maven Project
      run: mvn clean package -DskipTests

    - name: Configure AWS Credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Copy JAR to EC2 using SSM (Base64)
      run: |
        JAR_FILE=$(ls target/*.jar | head -n 1)

        BASE64_JAR=$(base64 -w 0 "$JAR_FILE")

        aws ssm send-command \
          --instance-ids "${{ env.INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy Spring Boot App" \
          --parameters "commands=[
            \"echo '$BASE64_JAR' | base64 -d > /home/ec2-user/app/app.jar\",
            \"sudo systemctl restart spring-app\",
            \"sudo systemctl status spring-app\"
          ]" \
          --region $AWS_REGION
