name: Deploy to EC2 via OIDC + SSM

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  INSTANCE_ID: i-094848138c2885f37

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Build Jar
      run: mvn clean package -DskipTests

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Encode JAR file
      run: |
        base64 target/*.jar > app.jar.b64

    - name: Deploy via SSM (no S3)
      run: |
        JAR_CONTENT=$(cat app.jar.b64)

        aws ssm send-command \
          --instance-ids "${{ env.INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy Spring Boot App" \
          --parameters "commands=[
            \"echo '$JAR_CONTENT' | base64 -d > /home/ec2-user/app/app.jar\",
            \"sudo systemctl restart spring-app\",
            \"sudo systemctl status spring-app\"
          ]" \
          --region $AWS_REGION
