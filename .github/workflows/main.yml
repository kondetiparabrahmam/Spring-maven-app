name: Full EC2 Create + Deploy Spring Boot (OIDC + SSM)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  INSTANCE_TYPE: t2.micro
  KEY_NAME: my-key
  SECURITY_GROUP_ID: sg-xxxxxxxx
  SUBNET_ID: subnet-xxxxxxxx
  IAM_INSTANCE_PROFILE: EC2-SSM-Role

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Build Spring Boot Jar
      run: mvn clean package -DskipTests

    # 🔐 OIDC LOGIN
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    # 🟢 CREATE EC2 INSTANCE
    - name: Create EC2 Instance
      id: ec2
      run: |
        INSTANCE_ID=$(aws ec2 run-instances \
          --image-id ami-0f5ee92e2d63afc18 \
          --instance-type $INSTANCE_TYPE \
          --iam-instance-profile Name=$IAM_INSTANCE_PROFILE \
          --key-name $KEY_NAME \
          --security-group-ids $SECURITY_GROUP_ID \
          --subnet-id $SUBNET_ID \
          --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=springboot-app}]' \
          --query 'Instances[0].InstanceId' \
          --output text)

        echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

    # ⏳ WAIT FOR INSTANCE TO BE READY
    - name: Wait for EC2 Running
      run: |
        aws ec2 wait instance-running --instance-ids $INSTANCE_ID

    # 🟢 WAIT FOR SSM TO BE READY
    - name: Wait for SSM Registration
      run: sleep 60

    # 🚀 DEPLOY SPRING BOOT VIA SSM
    - name: Deploy via SSM
      run: |
        aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy Spring Boot App" \
          --parameters 'commands=[
            "sudo yum update -y || true",
            "sudo mkdir -p /home/ec2-user/app",
            "curl -L -o /home/ec2-user/app/app.jar https://github.com/kondetiparabrahmam/spring-maven-app/releases/latest/download/app.jar",
            "sudo systemctl restart spring-app"
          ]' \
          --region $AWS_REGION
