name: Create EC2 + Deploy Spring Boot (OIDC + SSM)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  INSTANCE_TYPE: t2.micro
  KEY_NAME: my-key
  SECURITY_GROUP_ID: sg-xxxxxxxx
  SUBNET_ID: subnet-xxxxxxxx
  INSTANCE_PROFILE: githubactions

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Build Jar
      run: mvn clean package -DskipTests

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Create EC2 Instance
      run: |
        INSTANCE_ID=$(aws ec2 run-instances \
          --image-id ami-0f5ee92e2d63afc18 \
          --instance-type $INSTANCE_TYPE \
          --iam-instance-profile Name=$INSTANCE_PROFILE \
          --key-name $KEY_NAME \
          --security-group-ids $SECURITY_GROUP_ID \
          --subnet-id $SUBNET_ID \
          --query 'Instances[0].InstanceId' \
          --output text)

        echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

    - name: Wait for EC2
      run: aws ec2 wait instance-running --instance-ids $INSTANCE_ID

    - name: Wait for SSM
      run: sleep 60

    - name: Deploy via SSM
      run: |
        aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "mkdir -p /home/ec2-user/app",
            "curl -L -o /home/ec2-user/app/app.jar https://github.com/kondetiparabrahmam/spring-maven-app/releases/latest/download/app.jar",
            "sudo systemctl restart spring-app"
          ]' \
          --region $AWS_REGION
